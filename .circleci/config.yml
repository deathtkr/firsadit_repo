version: 2.1

jobs:
  terraform_apply:
    docker:
      - image: hashicorp/terraform:1.0.3
    steps:
      - checkout
      - run:
          name: Install curl and bash
          command: |
            apk update && apk add curl curl-dev bash
      - run:
          name: Install Azure CLI
          command: |
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
      - run:
          name: Azure CLI Login
          command: |
            az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
      - run:
          name: Terraform Init
          command: |
            cd terraform
            terraform init
      - run:
          name: Terraform Plan
          command: |
            cd terraform
            terraform plan
      - run:
          name: Terraform Apply
          command: |
            cd terraform
            terraform apply -auto-approve

workflows:
  version: 2
  terraform_workflow:
    jobs:
      - terraform_apply
