version: 2.1

jobs:
  terraform_apply:
    docker:
      - image: hashicorp/terraform:1.0.3
    steps:
      - checkout
      - run:
          name: Install Azure CLI
          command: |
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
      - run:
          name: Azure CLI Login
          command: |
            az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
      - run:
          name: Terraform Init
          command: |
            cd terraform
            terraform init
      - run:
          name: Terraform Apply
          command: |
            cd terraform
            terraform apply -auto-approve
      - run:
          name: Trigger Build Branch Pipeline
          command: |
            curl -u ${CIRCLECI_API_TOKEN}: \
            -d '{"branch":"main"}' \
            -X POST https://circleci.com/api/v2/project/github/deathtkr/firsadit_repo/pipeline

workflows:
  version: 2
  terraform_workflow:
    jobs:
      - terraform_apply

