version: 2.1

orbs:
  snyk: snyk/snyk@0.13.0
  sonarcloud: sonarsource/sonarcloud@2.0.0
  azure-cli: circleci/azure-cli@1.2.2
  terraform: circleci/terraform@3.1
  kubernetes: circleci/kubernetes@0.11.0

executors:
  dotnet-executor:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:6.0
  docker-executor:
    docker:
      - image: cimg/base:stable
  sonar-executor:
    docker:
      - image: cimg/openjdk:17.0.11-browsers  

jobs:
  build:
    executor: dotnet-executor
    steps:
      - checkout
      - run:
          name: Clear nuget
          command: dotnet nuget locals all --clear
      - run:
          name: Restore dependencies
          command: dotnet restore
      - run:
          name: Build the application
          command: dotnet build --configuration Release --no-restore
      - run:
          name: Publish the application
          command: dotnet publish --configuration Release --output ./publish --no-build 
      - run:
          name: Store artifacts
          command: |
            mkdir -p /tmp/artifacts
            cp -r ./publish /tmp/artifacts  # Copy published artifacts to a temporary directory
      - store_artifacts:
          path: /tmp/artifacts

  docker_build:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            docker build -f hello-world-api/Dockerfile -t $DOCKERHUB_USERNAME/helloworldapp:adi1 hello-world-api
      - run:
          name: Push Docker image
          command: |
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push $DOCKERHUB_USERNAME/helloworldapp:adi1

  sonarcloud_scan:
    executor: sonar-executor
    steps:
      - checkout 
      - run:
          name: Download SonarScanner
          command: |
            curl -sSLo sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.0.2966-linux.zip
            unzip sonar-scanner-cli.zip
            mv sonar-scanner-5.0.0.2966-linux sonar-scanner
      - run:
          name: Run SonarCloud Scan
          command: |
            ./sonar-scanner/bin/sonar-scanner \
              -Dsonar.projectKey=$projectKey \
              -Dsonar.organization=$organization \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=$Sonar_Token

  snyk_scan:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - snyk/scan

  deploy_infrastructure:
    docker:
      - image: cimg/openjdk:17.0.11-browsers
    steps:
      - checkout
      - terraform/install
      - run:
          name: Terraform Init
          command: |
            cd terraform
            terraform init
      - run:
          name: Terraform Plan
          command: |
            cd terraform
            terraform plan -var="subscription_id=${ARM_SUBSCRIPTION_ID}" -var="client_id=${ARM_CLIENT_ID}" -var="client_secret=${ARM_CLIENT_SECRET}" -var="tenant_id=${ARM_TENANT_ID}"
      - run:
          name: Terraform Apply
          command: |
            cd terraform
            terraform apply \
              -var="subscription_id=${ARM_SUBSCRIPTION_ID}" \
              -var="client_id=${ARM_CLIENT_ID}" \
              -var="client_secret=${ARM_CLIENT_SECRET}" \
              -var="tenant_id=${ARM_TENANT_ID}" \
              -auto-approve

  deploy_k8s:
    docker:
      - image: cimg/openjdk:17.0.11-browsers
    steps:
      - checkout
      - azure-cli/install
      - run:
          name: Azure CLI Login
          command: az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
      - run:
          name: Get AKS Credentials
          command: |
            az aks get-credentials --resource-group $RESOURCE_GROUP_NAME --name $CLUSTER_NAME
      - kubernetes/install-kubectl
      - run:
          name: Apply Kubernetes Deployment
          command: |
            cd kubernetes
            ls -la
            kubectl apply -f deployment.yml
      - run:
          name: Apply Kubernetes Service
          command: |
            cd kubernetes
            kubectl apply -f service.yml

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build
      - sonarcloud_scan:
          requires:
            - build
      - snyk_scan:
          requires:
            - build
      - docker_build:
          requires:
            - sonarcloud_scan
            - snyk_scan
      - deploy_infrastructure:
          requires:
            - docker_build
      - deploy_k8s:
          requires:
            - deploy_infrastructure
