version: 2.1
# Orbs define
orbs:
  azure-cli: circleci/azure-cli@1.2.2
  terraform: circleci/terraform@3.1

jobs:
  deploy_infrastructure:
    docker:
      - image: cimg/openjdk:17.0.11-browsers
    steps:
      - checkout
      - azure-cli/install
      - terraform/install
      - run:
          name: List files for debugging
          command: ls -la
      - run:
          name: Print Environment Variables
          command: |
            echo "ARM_SUBSCRIPTION_ID: $ARM_SUBSCRIPTION_ID"
            echo "ARM_CLIENT_ID: $ARM_CLIENT_ID"
            echo "ARM_CLIENT_SECRET: $ARM_CLIENT_SECRET"
            echo "ARM_TENANT_ID: $ARM_TENANT_ID"
      - run:
          name: Azure CLI Login
          command: az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
      - run:
          name: Terraform Init, Plan, and Apply
          command: |
            cd terraform
            terraform init
            terraform plan -var="subscription_id=${ARM_SUBSCRIPTION_ID}" -var="client_id=${ARM_CLIENT_ID}" -var="client_secret=${ARM_CLIENT_SECRET}" -var="tenant_id=${ARM_TENANT_ID}"
            terraform apply -var="subscription_id=${ARM_SUBSCRIPTION_ID}" -var="client_id=${ARM_CLIENT_ID}" -var="client_secret=${ARM_CLIENT_SECRET}" -var="tenant_id=${ARM_TENANT_ID}" -auto-approve

workflows:
  version: 2
  deploy_workflow:
    jobs:
      - deploy_infrastructure
